



## basic things
set -g base-index 1
set -g detach-on-destroy off
set -g renumber-windows on

## Prefix → C-A (like GNU screen)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

## Reload config with “prefix + r”
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

## Use Vim keys in copy mode
setw -g mode-keys vi
# begin “visual” selection with v
bind -T copy-mode-vi v send -X begin-selection  
# yank the selection and exit (like Vim’s y in visual mode)
bind -T copy-mode-vi y send -X copy-selection-and-cancel  
# yank current line (like Vim’s yy)
bind -T copy-mode-vi Y send -X copy-line  

## Easy pane navigation with Ctrl-h/j/k/l
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

## Split windows: | (vertical) and - (horizontal)
bind | split-window -h
bind - split-window -v

## Mouse suppor off
set -g mouse off

## Use true 256-color support
set -g default-terminal "screen-256color"

## Minimal status bar: session on left, date/time on right
set -g status-interval 5
set -g status-left  "#[fg=green]#S#[default]"
set -g status-right "#[fg=black]%Y-%m-%d #[fg=black]%H:%M#[default]"

## Bind Prefix + C to open a new pane running vim on the scrollback
bind C split-window -h "vim <(tmux capture-pane -pS - -J)"



