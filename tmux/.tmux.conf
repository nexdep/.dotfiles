



# 0) basic things
set -g base-index 1
set -g detach-on-destroy off
set -g renumber-windows on

# 1) Prefix → C-A (like GNU screen)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# 2) Reload config with “prefix + r”
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# 3) Use Vim keys in copy mode
setw -g mode-keys vi

# 4) Easy pane navigation with Ctrl-h/j/k/l
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# 5) Split windows: | (vertical) and - (horizontal)
bind | split-window -h
bind - split-window -v

# 6) Mouse suppor off
set -g mouse off

# 7) Use true 256-color support
set -g default-terminal "screen-256color"

# 8) Minimal status bar: session on left, date/time on right
set -g status-interval 5
set -g status-left  "#[fg=green]#S#[default]"
set -g status-right "#[fg=yellow]%Y-%m-%d #[fg=cyan]%H:%M#[default]"

