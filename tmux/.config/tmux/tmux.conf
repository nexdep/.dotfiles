##### tmux.conf 

##### Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix


# Fast ESC for (Neo)Vim
set -sg escape-time 10

# Better editor/app integration
set -g focus-events on

# Truecolor
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB,screen-256color:RGB,tmux-256color:RGB"

# Nice numbering
set -g base-index 1
setw -g pane-base-index 1
set -g detach-on-destroy off
set -g renumber-windows on

# Vim-style tmux copy-mode
setw -g mode-keys vi

# begin “visual” selection with v
bind -T copy-mode-vi v send -X begin-selection  
# yank the selection and exit (like Vim’s y in visual mode)
bind -T copy-mode-vi y send -X copy-selection-and-cancel  
# yank current line (like Vim’s yy)
bind -T copy-mode-vi Y send -X copy-line  

# Splits/windows keep the current working directory
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
bind-key c new-window       -c "#{pane_current_path}"

# Reload config
bind-key r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"


# Mouse off (predictable; enable if you prefer)
set -g mouse off

##### Better pane navigation (vim-like)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

## Bind Prefix + C to open a new pane running vim on the scrollback
bind C split-window -h "vim <(tmux capture-pane -pS - -J)"
set -g history-limit 10000

## Minimal status bar: session on left, date/time on right
set -g status-interval 5
set -g status-left  "#[fg=green]#S#[default]"
set -g status-right "#[fg=black]%Y-%m-%d #[fg=black]%H:%M#[default]"

